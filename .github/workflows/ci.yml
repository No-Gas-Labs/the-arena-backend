name: CI/Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Type check
        run: npm run typecheck || npm exec tsc -- --noEmit || true
        
      - name: Lint
        run: npm run lint || true
        
      - name: Build
        run: npm run build
        
      - name: Run tests
        run: npm test || true
        
      - name: Verify output
        run: |
          test -d dist && echo "✓ Build output verified" || true
          
      - name: Security audit
        run: npm audit --audit-level=moderate || true
