<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-Gas-Labs Ecosystem Map</title>
    <link rel="stylesheet" href="styles.css">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🌐 No-Gas-Labs Ecosystem</h1>
            <p class="subtitle">83 Repositories • 8 Domains</p>
        </header>

        <div class="status-bar">
            <div class="status-item">
                <span class="status-label">Constitutional Authority:</span>
                <span class="status-value">Node-H (Damien Featherstone)</span>
            </div>
            <div class="status-item">
                <span class="status-label">Registry Version:</span>
                <span class="status-value">1.0.0</span>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="arena">ARENA</button>
            <button class="filter-btn" data-filter="ninja">Ninja</button>
            <button class="filter-btn" data-filter="agp">AGP</button>
            <button class="filter-btn" data-filter="defi">DeFi</button>
            <button class="filter-btn" data-filter="def4us">DEF4US</button>
            <button class="filter-btn" data-filter="ngl">NGL</button>
        </div>

        <main class="domains-container" id="domains">
            <!-- Domains will be loaded via JavaScript -->
        </main>

        <section class="gaps-section">
            <h2>⚠️ Integration Gaps</h2>
            <div class="gaps-list" id="gaps">
                <!-- Gaps will be loaded via JavaScript -->
            </div>
        </section>

        <section class="stats-section">
            <h2>📊 Statistics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="total-repos">83</div>
                    <div class="stat-label">Total Repositories</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="private-repos">78</div>
                    <div class="stat-label">Private</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="public-repos">5</div>
                    <div class="stat-label">Public</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="android-high">7</div>
                    <div class="stat-label">Android-Ready</div>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p>Generated by MASTER_INTEGRATION_DIRECTIVE</p>
            <p>Last Updated: 2026-03-31</p>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
